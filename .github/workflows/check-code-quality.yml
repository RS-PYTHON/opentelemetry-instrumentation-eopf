name: Check code quality

on:
  push:
    branches:
      - develop # pushes on the 'develop' branch
      - main
    tags:
      - '**' # new git tags (including hierarchical tags like v1.0/beta)
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  PYTHON_VERSION: 3.13.12

jobs:

  check-format:
    runs-on: ubuntu-latest
    name: Check pre-commit
    steps:
      - uses: actions/checkout@v6
      - run: >
          echo
          ":information_source: This job checks that you have run \`pre-commit run --all-files\` in
          your local git repository before committing."
          >> $GITHUB_STEP_SUMMARY
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  check-license:
    runs-on: ubuntu-latest
    name: Check copyright license headers
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
      - name: check License Header
        uses: apache/skywalking-eyes/header@8c96ee223558797cdd9eba82c0919258e1cf2dad # main
        with:
          log: debug
          mode: check

  check-security:
    runs-on: ubuntu-latest
    name: Check security (bandit, safety, trivy)
    permissions:
      security-events: write # needed for github/codeql-action/upload-sarif
    steps:
      - uses: actions/checkout@v6

      - name: Pip install tools
        run: |
          set -x
          pip install "bandit==1.9.1" "safety==3.6.0" \
            "typer==0.16.0" # version compatible with safety
        shell: bash

      - id: bandit
        name: Run bandit
        if: always() # even if previous steps returned a non-zero exit code
        run: |
          set -x
          bandit -r . || true # run next line even if fails
          bandit -r . -f json -o ./bandit-report.json || true # ignore errors
        shell: bash

      - id: safety
        name: Run safety
        if: always() && github.actor != 'dependabot[bot]' # dependabot does not have access to secrets
        env:
            SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          set -x
          safety --key $SAFETY_API_KEY scan --detailed-output
        shell: bash

      - name: Run Trivy vulnerability scanner
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
        with:
          version: v0.69.3
          scan-type: fs
          ignore-unfixed: true
          format: table
          exit-code: 1

      - name: Export Trivy results to sarif
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
        with:
          version: v0.69.3
          scan-type: fs
          ignore-unfixed: true
          format: sarif
          output: trivy-results-fs.sarif

      - name: Save reports as artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: check-security
          path: |
            ./bandit-report.json
            ./trivy-results-fs.sarif
          retention-days: 1

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-fs.sarif
          category: git repository

      - name: "Display link to Trivy results"
        if: always()
        run: |

          set -x

          # If this is not a pull request, the query is "is:open+branch:branch_name"
          if [[ "${{ github.ref_name }}" != *merge* ]]; then
            query="is:open+branch:${{ github.ref_name }}"

          # Else the ref_name is e.g. '13/merge'. Change it into 'pr:13'
          else
            query=$(sed "s|\(.*\)/merge|pr:\1|g" <<< "${{ github.ref_name }}")
          fi

          echo "Trivy scan results:" \
          "https://github.com/${{ github.repository }}/security/code-scanning?query=${query}" \
          >> $GITHUB_STEP_SUMMARY
        shell: bash

  generate-quality-report:
    runs-on: ubuntu-latest
    name: Quality report (sonarqube)
    needs: [check-security] # see actions/download-artifact below
    permissions:
      pull-requests: write # for: phwt/sonarqube-quality-gate-action
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: RS-PYTHON_opentelemetry-instrumentation-eopf
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for SCM and branch analysis
      - name: Download vulnerability reports
        uses: actions/download-artifact@v8
        with:
          name:
            check-security

      - name: Run SonarCloud Scanner
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=rs-python
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.sources=.
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.python.version=${{ env.PYTHON_VERSION }}
            -Dsonar.python.bandit.reportPaths=./bandit-report.json

      - name: Wait for quality gate result
        run: sleep 5

      - name: Report quality gate result in the pull request comment
        uses: phwt/sonarqube-quality-gate-action@e8842ff65b97bfa4fd4effe3ab0909f568d16e91 # v1
        id: quality-gate-result
        with:
          sonar-project-key: ${{ env.SONAR_PROJECT_KEY }}
          sonar-host-url: ${{ env.SONAR_HOST_URL }}
          sonar-token: ${{ env.SONAR_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}

      - name: Output result
        run: |
          echo "Project status: ${{ steps.quality-gate-result.outputs.project-status }}"
          echo "Quality gate result: ${{ steps.quality-gate-result.outputs.quality-gate-result }}"

      - id: check-gate
        name: Check quality gate status
        uses: sonarsource/sonarqube-quality-gate-action@cb3ed20f9fec62b4c3b8ad9e77656c6adaade913 # master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
